<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 双线墙体 - 标准建筑制图表示法 -->
  <rect x="10" y="42" width="80" height="16" fill="#d4c4b0" opacity="0.9"/>
  <line x1="10" y1="42" x2="90" y2="42" stroke="#8b7355" stroke-width="2.5" stroke-linecap="square"/>
  <line x1="10" y1="58" x2="90" y2="58" stroke="#8b7355" stroke-width="2.5" stroke-linecap="square"/>
  <!-- 中心线（虚线） -->
  <line x1="10" y1="50" x2="90" y2="50" stroke="#666" stroke-width="1" stroke-dasharray="4,2" opacity="0.6"/>
</svg>
